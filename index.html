<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Name — Aerospace Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#fff}
#c{display:block;width:100vw;height:100vh}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#name{position:absolute;top:2rem;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity 1s}
#name h1{font-size:.85rem;letter-spacing:.4em;text-transform:uppercase;font-weight:300;color:rgba(255,255,255,.8)}
#name p{font-size:.55rem;letter-spacing:.25em;color:#5de0f8;margin-top:4px;text-transform:uppercase}

#arrows{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:280px;opacity:0;transition:opacity .6s;pointer-events:none}
#arrows.show{opacity:1;pointer-events:auto}
.arr-btn{width:48px;height:48px;border:1px solid rgba(93,224,248,.5);background:rgba(93,224,248,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;pointer-events:auto}
.arr-btn:hover{background:rgba(93,224,248,.22)}
.arr-btn svg{width:20px;height:20px;stroke:#5de0f8;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

#label-hud{position:absolute;right:calc(50% - 200px);top:50%;transform:translateY(-50%);opacity:0;transition:opacity .5s,transform .5s;pointer-events:none}
#label-hud.show{opacity:1;pointer-events:auto}
#label-tag{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:#5de0f8;margin-bottom:6px}
#label-name{font-size:1.9rem;font-weight:600;cursor:pointer;line-height:1;position:relative;display:inline-block}
#label-name::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:#5de0f8;transition:width .3s}
#label-name:hover::after{width:100%}
#label-sub{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:8px;max-width:240px;line-height:1.5;font-weight:300;font-family:sans-serif}
#label-cta{display:inline-block;margin-top:12px;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#f5a623;border:1px solid #f5a623;padding:5px 12px;cursor:pointer;transition:background .2s,color .2s;pointer-events:auto}
#label-cta:hover{background:#f5a623;color:#000}

#dots{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;gap:8px;opacity:0;transition:opacity .6s}
#dots.show{opacity:1}
.dot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(93,224,248,.4);transition:background .3s}
.dot.active{background:#5de0f8;border-color:#5de0f8}

#hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);opacity:0;transition:opacity .6s}
#hint.show{opacity:1}

#launch-hint{position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* Page overlay */
#overlay{position:fixed;inset:0;z-index:100;background:rgba(4,8,20,0);backdrop-filter:blur(0px);pointer-events:none;transition:background .5s,backdrop-filter .5s;display:flex;align-items:center;justify-content:center}
#overlay.open{background:rgba(4,8,20,.93);backdrop-filter:blur(10px);pointer-events:auto}
#page{max-width:660px;width:90%;opacity:0;transform:translateY(28px);transition:opacity .4s .2s,transform .4s .2s;padding:2.8rem;border:1px solid rgba(93,224,248,.15);position:relative;max-height:80vh;overflow-y:auto}
#overlay.open #page{opacity:1;transform:none}
#pg-tag{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:#5de0f8;margin-bottom:.8rem}
#pg-title{font-size:2.5rem;font-weight:200;line-height:1.1;margin-bottom:1.2rem}
#pg-body{font-size:.92rem;font-weight:300;color:rgba(255,255,255,.7);line-height:1.85;font-family:sans-serif}
#pg-body p+p{margin-top:.9rem}
#close{position:absolute;top:1rem;right:1.2rem;font-size:.65rem;letter-spacing:.15em;color:rgba(255,255,255,.4);cursor:pointer;border:1px solid rgba(255,255,255,.15);padding:4px 10px;background:none;text-transform:uppercase;font-family:'Courier New',monospace}
#close:hover{color:#fff;border-color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="name"><h1>Your Name</h1><p>Aerospace Engineer</p></div>

  <div id="arrows">
    <button class="arr-btn" id="btn-l" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="arr-btn" id="btn-r" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div id="label-hud">
    <div id="label-tag"></div>
    <div id="label-name" onclick="openPage()"></div>
    <div id="label-sub"></div>
    <div id="label-cta" onclick="openPage()">Open section →</div>
  </div>

  <div id="dots"></div>
  <div id="hint">← keyboard arrows to navigate · enter to open</div>
  <div id="launch-hint" id="lhint">Click anywhere to launch</div>
</div>

<div id="overlay" onclick="overlayBg(event)">
  <div id="page">
    <button id="close" onclick="closePage()">✕ Close</button>
    <div id="pg-tag"></div>
    <div id="pg-title"></div>
    <div id="pg-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const SECTIONS = [
  { tag:'Mission Brief', name:'About Me',    sub:'Who I am and what drives me.',           angle: 0,
    body:`<p>Hi, I'm <strong style="color:#fff">Your Name</strong> — an aerospace engineer specializing in [propulsion / structures / avionics / systems engineering].</p>
          <p>I've spent my career working on [launch vehicles / satellites / defense systems]. I'm driven by the challenge of building things that work reliably at the absolute edge of what's physically possible.</p>
          <p>Outside of engineering, I [hobby or interest]. I believe the best engineering teams run on curiosity, rigorous thinking, and the willingness to question every assumption.</p>` },
  { tag:'Flight Log',   name:'Experience',   sub:'Missions and roles I\'ve been part of.', angle: Math.PI*2/5,
    body:`<p><strong style="color:#fff">Senior Aerospace Engineer</strong> — Company Name &nbsp;(2021–Present)<br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Key responsibilities and impact. What systems did you own? What did you ship?</span></p><br/>
          <p><strong style="color:#fff">Aerospace Engineer II</strong> — Previous Company &nbsp;(2018–2021)<br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">What you contributed — tests passed, systems validated, launches supported.</span></p><br/>
          <p><strong style="color:#fff">Engineering Intern</strong> — Earlier Company &nbsp;(2017)<br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Brief description of your internship and what you learned.</span></p>` },
  { tag:'Payload Bay',  name:'Projects',     sub:'Technical work I\'m proud of.',           angle: Math.PI*4/5,
    body:`<p><strong style="color:#fff">Project One — Title Here</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Goal, your role, outcome. E.g. designed a thrust structure for a 2nd-stage LOX/kerosene engine — met mass budget within 3%.</span></p><br/>
          <p><strong style="color:#fff">Project Two — Title Here</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Another project. Link to papers, GitHub repos, or writeups if available.</span></p><br/>
          <p><strong style="color:#fff">Project Three — Title Here</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Side projects, research, academic work, or personal builds all count here.</span></p>` },
  { tag:'Systems Check',name:'Skills',       sub:'Tools, disciplines, and methods.',        angle: Math.PI*6/5,
    body:`<p><strong style="color:#fff">Disciplines</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Structural analysis · Propulsion · GN&amp;C · Systems engineering · Thermal management</span></p><br/>
          <p><strong style="color:#fff">Tools &amp; Software</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">MATLAB · Simulink · ANSYS · CATIA / SolidWorks · Python · STK</span></p><br/>
          <p><strong style="color:#fff">Education</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">B.S./M.S. Aerospace Engineering — University Name</span></p>` },
  { tag:'Ground Control',name:'Contact',     sub:'Let\'s connect and build something.',     angle: Math.PI*8/5,
    body:`<p>Open to new opportunities, collaborations, and interesting problems in aerospace.</p><br/>
          <p>📧 &nbsp;<a href="mailto:your@email.com" style="color:#5de0f8">your@email.com</a></p>
          <p>🔗 &nbsp;<a href="https://linkedin.com/in/yourprofile" target="_blank" style="color:#5de0f8">linkedin.com/in/yourprofile</a></p>
          <p>💻 &nbsp;<a href="https://github.com/yourusername" target="_blank" style="color:#5de0f8">github.com/yourusername</a></p>` }
];

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 2000);
camera.position.set(0, 2, 12);
camera.lookAt(0, 2, 0);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ─── LIGHTS ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x223355, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(5, 10, 5);
scene.add(sun);
const rimLight = new THREE.DirectionalLight(0x5de0f8, 0.4);
rimLight.position.set(-4, 0, -4);
scene.add(rimLight);

// ─── ROCKET ──────────────────────────────────────────────────────────────────
const rocketGroup = new THREE.Group();
scene.add(rocketGroup);

// Materials
const whiteMat  = new THREE.MeshPhongMaterial({color:0xdde8f5, shininess:80});
const darkMat   = new THREE.MeshPhongMaterial({color:0x1a2a4a, shininess:40});
const nozzleMat = new THREE.MeshPhongMaterial({color:0x8899aa, shininess:120});
const accentMat = new THREE.MeshPhongMaterial({color:0x5de0f8, shininess:200, emissive:0x112233});
const redMat    = new THREE.MeshPhongMaterial({color:0xc13a2a, shininess:60});

// Body (tall cylinder)
const bodyGeo = new THREE.CylinderGeometry(0.38, 0.42, 5.5, 32);
const body = new THREE.Mesh(bodyGeo, whiteMat);
body.position.y = 2.75;
rocketGroup.add(body);

// Nose cone
const noseGeo = new THREE.ConeGeometry(0.38, 2.2, 32);
const nose = new THREE.Mesh(noseGeo, whiteMat);
nose.position.y = 6.1;
rocketGroup.add(nose);

// Nose tip (darker)
const tipGeo = new THREE.ConeGeometry(0.12, 0.5, 16);
const tip = new THREE.Mesh(tipGeo, darkMat);
tip.position.y = 7.15;
rocketGroup.add(tip);

// Accent stripe
const stripeGeo = new THREE.CylinderGeometry(0.43, 0.43, 0.18, 32);
const stripe = new THREE.Mesh(stripeGeo, accentMat);
stripe.position.y = 3.8;
rocketGroup.add(stripe);

const stripe2 = new THREE.Mesh(stripeGeo, redMat);
stripe2.position.y = 1.8;
rocketGroup.add(stripe2);

// Window
const winGeo = new THREE.SphereGeometry(0.22, 16, 16);
const winMat = new THREE.MeshPhongMaterial({color:0x5de0f8, shininess:300, emissive:0x0a2233, transparent:true, opacity:0.9});
const win = new THREE.Mesh(winGeo, winMat);
win.position.set(0.42, 4.6, 0);
rocketGroup.add(win);

// Engine section (wider base)
const engineGeo = new THREE.CylinderGeometry(0.5, 0.55, 0.6, 32);
const engineShell = new THREE.Mesh(engineGeo, darkMat);
engineShell.position.y = 0.3;
rocketGroup.add(engineShell);

// Nozzle
const nozzleGeo = new THREE.CylinderGeometry(0.18, 0.32, 0.7, 24, 1, true);
const nozzle = new THREE.Mesh(nozzleGeo, nozzleMat);
nozzle.position.y = -0.35;
rocketGroup.add(nozzle);

// Grid fins (4x)
function addFin(angle) {
  const g = new THREE.Group();
  const finGeo = new THREE.BoxGeometry(0.06, 0.55, 0.45);
  const fin = new THREE.Mesh(finGeo, darkMat);
  fin.position.set(0.55, 0, 0);
  g.add(fin);
  // cross piece
  const crossGeo = new THREE.BoxGeometry(0.06, 0.06, 0.45);
  [-0.18, 0, 0.18].forEach(y => {
    const c = new THREE.Mesh(crossGeo, nozzleMat);
    c.position.set(0.55, y, 0);
    g.add(c);
  });
  g.rotation.y = angle;
  g.position.y = 0.6;
  rocketGroup.add(g);
}
[0, Math.PI/2, Math.PI, Math.PI*3/2].forEach(a => addFin(a));

// Landing legs (folded up, 4x)
function addLeg(angle) {
  const geo = new THREE.BoxGeometry(0.05, 0.7, 0.05);
  const leg = new THREE.Mesh(geo, darkMat);
  leg.position.set(0.45, -0.15, 0);
  leg.rotation.z = 0.3;
  const g = new THREE.Group();
  g.add(leg);
  g.rotation.y = angle;
  rocketGroup.add(g);
}
[Math.PI/4, Math.PI*3/4, Math.PI*5/4, Math.PI*7/4].forEach(a => addLeg(a));

// Section labels on rocket hull (canvas textures)
const labelMeshes = [];
SECTIONS.forEach((sec, i) => {
  const cvs = document.createElement('canvas');
  cvs.width = 512; cvs.height = 128;
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, 512, 128);
  ctx.fillStyle = 'rgba(93,224,248,0.12)';
  ctx.fillRect(0, 20, 512, 88);
  ctx.strokeStyle = 'rgba(93,224,248,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 20, 510, 88);
  ctx.fillStyle = 'rgba(93,224,248,0.8)';
  ctx.font = '500 18px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText(sec.tag.toUpperCase(), 18, 50);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 36px sans-serif';
  ctx.fillText(sec.name, 18, 96);

  const tex = new THREE.CanvasTexture(cvs);
  const labelGeo = new THREE.PlaneGeometry(1.8, 0.45);
  const labelMat = new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide});
  const mesh = new THREE.Mesh(labelGeo, labelMat);
  const a = sec.angle;
  const r = 0.45;
  mesh.position.set(Math.sin(a)*r, 3.2, Math.cos(a)*r);
  mesh.rotation.y = -a;
  rocketGroup.add(mesh);
  labelMeshes.push(mesh);
});

// ─── EXHAUST FLAME ───────────────────────────────────────────────────────────
const flameGroup = new THREE.Group();
flameGroup.position.y = -0.7;
rocketGroup.add(flameGroup);

const flameParts = [];
for (let i = 0; i < 3; i++) {
  const fg = new THREE.ConeGeometry(0.15 - i*0.04, 0.8 + i*0.3, 8);
  const col = [0xffffff, 0xffaa33, 0xff4400][i];
  const fm = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:[0.9,0.7,0.4][i]});
  const ff = new THREE.Mesh(fg, fm);
  ff.rotation.x = Math.PI;
  ff.position.y = -(i * 0.15);
  flameGroup.add(ff);
  flameParts.push(ff);
}
flameGroup.visible = false;

// ─── LAUNCHPAD ───────────────────────────────────────────────────────────────
const padGroup = new THREE.Group();
scene.add(padGroup);

const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshPhongMaterial({color:0x2a2a2a});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -2;
padGroup.add(ground);

const padGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32);
const padMat = new THREE.MeshPhongMaterial({color:0x444444});
const pad = new THREE.Mesh(padGeo, padMat);
pad.position.y = -1.9;
padGroup.add(pad);

// Gantry arms
[[1.8,0],[−1.8,0],[0,1.8],[0,-1.8]].forEach(([x,z]) => {
  const g = new THREE.Mesh(new THREE.BoxGeometry(0.08, 3.5, 0.08), new THREE.MeshPhongMaterial({color:0x555566}));
  g.position.set(x, 0, z);
  padGroup.add(g);
});

// ─── STARS ───────────────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount*3; i++) starPos[i] = (Math.random()-0.5)*1800;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({color:0xffffff, size:1.2, sizeAttenuation:true, transparent:true, opacity:0});
const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

// ─── CLOUDS ──────────────────────────────────────────────────────────────────
const cloudGroup = new THREE.Group();
scene.add(cloudGroup);
for (let i = 0; i < 18; i++) {
  const cg = new THREE.SphereGeometry(2 + Math.random()*3, 8, 6);
  const cm = new THREE.MeshPhongMaterial({color:0xffffff, transparent:true, opacity:0.55});
  const cv = new THREE.Mesh(cg, cm);
  cv.position.set((Math.random()-0.5)*60, 12 + Math.random()*8, (Math.random()-0.5)*60 - 20);
  cv.scale.y = 0.35;
  cloudGroup.add(cv);
}
cloudGroup.visible = false;

// ─── METEORS ─────────────────────────────────────────────────────────────────
const meteors = [];
function spawnMeteor() {
  const g = new THREE.Group();
  const mg = new THREE.CylinderGeometry(0.03, 0.01, 1.5+Math.random()*2, 4);
  const mm = new THREE.MeshBasicMaterial({color:0xffcc77, transparent:true, opacity:0.8});
  const m = new THREE.Mesh(mg, mm);
  m.rotation.z = Math.PI/2;
  g.add(m);
  g.position.set(30 + Math.random()*20, 20 + Math.random()*30, -20 - Math.random()*40);
  const spd = 0.4 + Math.random()*0.5;
  g.userData = {vx:-spd, vy:-spd*0.4, life:0, maxLife:120};
  scene.add(g);
  meteors.push(g);
}

// ─── SKY COLOR ───────────────────────────────────────────────────────────────
const skyColors = [
  new THREE.Color(0x87ceeb), // ground - blue sky
  new THREE.Color(0x4a90d9), // low atmo
  new THREE.Color(0x1a3a6e), // high atmo
  new THREE.Color(0x050d1e), // space
];

// ─── STATE MACHINE ───────────────────────────────────────────────────────────
// phases: 'prelaunch' | 'launching' | 'flying' | 'orbit'
let phase = 'prelaunch';
let launchT = 0;
let orbitReady = false;
let currentSection = 0;
let targetRotY = 0;
let rotY = 0;
let busy = false;

// rocket start pos
rocketGroup.position.set(0, -1.85, 0);

// ─── DOM SETUP ───────────────────────────────────────────────────────────────
const dotsEl = document.getElementById('dots');
SECTIONS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' active':'');
  dotsEl.appendChild(d);
});

function updateLabel(idx) {
  const s = SECTIONS[idx];
  document.getElementById('label-tag').textContent = s.tag;
  document.getElementById('label-name').textContent = s.name;
  document.getElementById('label-sub').textContent = s.sub;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}
updateLabel(0);

function showOrbitUI() {
  document.getElementById('name').style.opacity = '1';
  document.getElementById('arrows').classList.add('show');
  document.getElementById('label-hud').classList.add('show');
  document.getElementById('dots').classList.add('show');
  document.getElementById('hint').classList.add('show');
  document.getElementById('launch-hint').style.display = 'none';
}

function rotate(dir) {
  if (busy || phase !== 'orbit') return;
  busy = true;
  const lh = document.getElementById('label-hud');
  lh.style.opacity = '0';
  lh.style.transform = 'translateY(-50%) translateX(' + (dir*10) + 'px)';
  currentSection = (currentSection + dir + SECTIONS.length) % SECTIONS.length;
  targetRotY = -SECTIONS[currentSection].angle;
  setTimeout(() => {
    updateLabel(currentSection);
    lh.style.transition = 'opacity .45s, transform .45s';
    lh.style.opacity = '1';
    lh.style.transform = 'translateY(-50%) translateX(0)';
    busy = false;
  }, 350);
}

document.getElementById('btn-l').addEventListener('click', () => rotate(-1));
document.getElementById('btn-r').addEventListener('click', () => rotate(1));
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  rotate(-1);
  if (e.key==='ArrowRight') rotate(1);
  if (e.key==='Escape')     closePage();
  if (e.key==='Enter')      openPage();
});

// Launch on click
document.getElementById('c').addEventListener('click', () => {
  if (phase === 'prelaunch') startLaunch();
});

function startLaunch() {
  phase = 'launching';
  flameGroup.visible = true;
  cloudGroup.visible = true;
  document.getElementById('launch-hint').style.display = 'none';
}

function openPage() {
  if (phase !== 'orbit') return;
  const s = SECTIONS[currentSection];
  document.getElementById('pg-tag').textContent = s.tag;
  document.getElementById('pg-title').textContent = s.name;
  document.getElementById('pg-body').innerHTML = s.body;
  document.getElementById('overlay').classList.add('open');
}
function closePage() { document.getElementById('overlay').classList.remove('open'); }
function overlayBg(e) { if (e.target===document.getElementById('overlay')) closePage(); }
window.openPage = openPage;
window.closePage = closePage;
window.overlayBg = overlayBg;
window.rotate = rotate;

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let meteorTimer = 0;

function lerp(a, b, t) { return a + (b-a)*t; }
function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI*2;
  while (d < -Math.PI) d += Math.PI*2;
  return a + d*t;
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Flame flicker
  if (flameGroup.visible) {
    const fl = 0.9 + Math.sin(elapsed*28)*0.1;
    flameGroup.scale.set(fl, 0.9+Math.sin(elapsed*22)*0.15, fl);
  }

  // Star rotation drift
  starField.rotation.y = elapsed * 0.002;

  // Meteor system (orbit phase)
  if (phase === 'orbit') {
    meteorTimer += dt;
    if (meteorTimer > 2.5 + Math.random()*3) {
      spawnMeteor();
      meteorTimer = 0;
    }
    meteors.forEach((m, i) => {
      m.userData.life++;
      m.position.x += m.userData.vx;
      m.position.y += m.userData.vy;
      m.children[0].material.opacity = Math.max(0, 0.8 * (1 - m.userData.life/m.userData.maxLife));
      if (m.userData.life >= m.userData.maxLife) {
        scene.remove(m);
        meteors.splice(i, 1);
      }
    });
  }

  // LAUNCH phase
  if (phase === 'launching') {
    launchT += dt;
    const t = launchT;

    // Rocket ascent
    rocketGroup.position.y = -1.85 + t*t*0.8;

    // Camera follows up
    camera.position.y = lerp(2, 2 + rocketGroup.position.y * 0.6, Math.min(t/4, 1));
    camera.lookAt(0, rocketGroup.position.y, 0);

    // Sky color transition: blue → dark
    const skyT = Math.min(t / 8, 1);
    const skyCol = new THREE.Color().lerpColors(skyColors[0], skyColors[3], skyT);
    renderer.setClearColor(skyCol);

    // Stars fade in
    starMat.opacity = Math.min(skyT * 1.2, 1);

    // Clouds drift by and fade
    cloudGroup.children.forEach(c => {
      c.position.y -= dt * (1 + t*0.1);
      c.material.opacity = Math.max(0, 0.55 - t*0.06);
    });

    // Launchpad shrinks away
    padGroup.scale.setScalar(Math.max(0.01, 1 - t*0.15));
    padGroup.position.y = -rocketGroup.position.y * 0.5;

    // Camera pull back to show rocket fully
    camera.position.z = lerp(12, 9, Math.min(t/5, 1));

    // Transition to orbit when high enough
    if (t > 7) {
      phase = 'orbit';
      padGroup.visible = false;
      cloudGroup.visible = false;
      renderer.setClearColor(0x050d1e);
      starMat.opacity = 1;
      rocketGroup.position.set(0, 0, 0);
      camera.position.set(0, 1.5, 9);
      camera.lookAt(0, 1.5, 0);
      showOrbitUI();
    }
  }

  // ORBIT phase — gentle hover + rotation
  if (phase === 'orbit') {
    rocketGroup.position.y = Math.sin(elapsed * 0.5) * 0.12;
    // Smooth rotation to target
    rotY = lerpAngle(rotY, targetRotY, 0.06);
    rocketGroup.rotation.y = rotY;
    // Gentle camera sway
    camera.position.x = Math.sin(elapsed * 0.15) * 0.2;
    camera.lookAt(0, 1, 0);
  }

  // PRELAUNCH — idle
  if (phase === 'prelaunch') {
    renderer.setClearColor(skyColors[0]);
    rocketGroup.position.y = -1.85 + Math.sin(elapsed*0.8)*0.03;
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
