<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Name — Aerospace Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#fff}
#c{display:block;width:100vw;height:100vh;cursor:pointer}
#c.orbit{cursor:default}

/* ── LOADING SCREEN ── */
#loader{
  position:fixed;inset:0;z-index:200;
  background:#020810;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;
  transition:opacity .8s ease;
}
#loader.hidden{opacity:0;pointer-events:none;}
#loader-title{font-size:.75rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.6)}
#loader-bar-wrap{width:220px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
#loader-bar{height:100%;width:0%;background:#5de0f8;transition:width .25s ease;border-radius:1px}
#loader-pct{font-size:.6rem;letter-spacing:.18em;color:#5de0f8}
#loader-status{font-size:.55rem;letter-spacing:.15em;color:rgba(255,255,255,.35);text-transform:uppercase}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#name{position:absolute;top:2rem;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity 1.2s;white-space:nowrap}
#name h1{font-size:.82rem;letter-spacing:.42em;text-transform:uppercase;font-weight:300;color:rgba(255,255,255,.85)}
#name p{font-size:.54rem;letter-spacing:.26em;color:#5de0f8;margin-top:5px;text-transform:uppercase}

#arr-left{position:absolute;left:1.8rem;top:50%;transform:translateY(-50%);opacity:0;transition:opacity .7s;pointer-events:none}
#arr-right{position:absolute;right:1.8rem;top:50%;transform:translateY(-50%);opacity:0;transition:opacity .7s;pointer-events:none}
#arr-left.show,#arr-right.show{opacity:1;pointer-events:auto}
.arr-btn{width:52px;height:52px;border:1px solid rgba(93,224,248,.45);background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;backdrop-filter:blur(4px)}
.arr-btn:hover{background:rgba(93,224,248,.18);border-color:rgba(93,224,248,.8)}
.arr-btn svg{width:22px;height:22px;stroke:#5de0f8;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

#label-hud{position:absolute;bottom:5.8rem;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity .5s;pointer-events:none;white-space:nowrap}
#label-hud.show{opacity:1;pointer-events:auto}
#label-tag{font-size:.56rem;letter-spacing:.24em;text-transform:uppercase;color:#5de0f8;margin-bottom:5px}
#label-name{font-size:1.8rem;font-weight:600;cursor:pointer;line-height:1;display:inline-block;position:relative}
#label-name::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:#5de0f8;transition:width .3s}
#label-name:hover::after{width:100%}
#label-sub{font-size:.78rem;color:rgba(255,255,255,.48);margin-top:7px;line-height:1.5;font-family:sans-serif;font-weight:300}
#label-cta{display:inline-block;margin-top:11px;font-size:.63rem;letter-spacing:.16em;text-transform:uppercase;color:#f5a623;border:1px solid rgba(245,166,35,.6);padding:5px 16px;cursor:pointer;transition:background .2s,color .2s,border-color .2s;pointer-events:auto;backdrop-filter:blur(4px)}
#label-cta:hover{background:#f5a623;color:#000;border-color:#f5a623}

#dots{position:absolute;bottom:3.4rem;left:50%;transform:translateX(-50%);display:flex;gap:8px;opacity:0;transition:opacity .7s}
#dots.show{opacity:1}
.dot{width:6px;height:6px;border-radius:50%;border:1px solid rgba(93,224,248,.35);transition:background .3s,border-color .3s}
.dot.active{background:#5de0f8;border-color:#5de0f8}

#hint{position:absolute;bottom:1.8rem;left:50%;transform:translateX(-50%);font-size:.53rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.25);opacity:0;transition:opacity .7s;white-space:nowrap}
#hint.show{opacity:1}
#launch-hint{position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.55);animation:pulse 2.2s ease-in-out infinite;white-space:nowrap;pointer-events:none}
@keyframes pulse{0%,100%{opacity:.28}50%{opacity:.85}}
#rotate-hint{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(93,224,248,.55);opacity:0;transition:opacity .8s;white-space:nowrap;pointer-events:none;text-align:center}
#rotate-hint.show{opacity:1}

/* ── MODEL DEBUG (shown briefly, auto-hides) ── */
#debug{position:absolute;top:1rem;right:1rem;font-size:.55rem;color:rgba(255,255,255,.35);line-height:1.8;text-align:right;opacity:0;transition:opacity .5s}
#debug.show{opacity:1}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;z-index:100;background:rgba(3,7,18,0);backdrop-filter:blur(0px);pointer-events:none;transition:background .5s,backdrop-filter .5s;display:flex;align-items:center;justify-content:center}
#overlay.open{background:rgba(3,7,18,.94);backdrop-filter:blur(12px);pointer-events:auto}
#page{max-width:660px;width:90%;opacity:0;transform:translateY(26px);transition:opacity .4s .15s,transform .4s .15s;padding:2.8rem;border:1px solid rgba(93,224,248,.14);position:relative;max-height:82vh;overflow-y:auto;background:rgba(5,12,28,.6)}
#overlay.open #page{opacity:1;transform:none}
#pg-tag{font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:#5de0f8;margin-bottom:.85rem}
#pg-title{font-size:2.4rem;font-weight:200;line-height:1.1;margin-bottom:1.3rem}
#pg-body{font-size:.91rem;font-weight:300;color:rgba(255,255,255,.72);line-height:1.9;font-family:sans-serif}
#pg-body p+p{margin-top:.9rem}
#close-btn{position:absolute;top:1rem;right:1.2rem;font-size:.62rem;letter-spacing:.15em;color:rgba(255,255,255,.38);cursor:pointer;border:1px solid rgba(255,255,255,.14);padding:4px 10px;background:none;text-transform:uppercase;font-family:'Courier New',monospace;transition:color .2s,border-color .2s}
#close-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loader">
  <div id="loader-title">Initializing Mission Systems</div>
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
  <div id="loader-pct">0%</div>
  <div id="loader-status">Loading vehicle model...</div>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="name"><h1>Your Name</h1><p>Aerospace Engineer</p></div>
  <div id="arr-left"><button class="arr-btn" id="btn-l" aria-label="Previous"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button></div>
  <div id="arr-right"><button class="arr-btn" id="btn-r" aria-label="Next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button></div>
  <div id="label-hud">
    <div id="label-tag"></div>
    <div id="label-name"></div>
    <div id="label-sub"></div>
    <div id="label-cta">Open section &rarr;</div>
  </div>
  <div id="dots"></div>
  <div id="hint">arrow keys to navigate &nbsp;&bull;&nbsp; enter to open</div>
  <div id="launch-hint">Click to launch</div>
  <div id="rotate-hint">Use arrow keys to rotate the rocket</div>
  <div id="debug"></div>
</div>

<div id="overlay">
  <div id="page">
    <button id="close-btn">&#x2715; Close</button>
    <div id="pg-tag"></div>
    <div id="pg-title"></div>
    <div id="pg-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ── SECTIONS ─────────────────────────────────────────────────────────────────
var SECTIONS = [
  { tag:'Mission Brief', name:'About Me',   sub:'Who I am and what drives me.',           angle:0,
    body:'<p>Hi, I\'m <strong style="color:#fff">Your Name</strong> — an aerospace engineer specializing in [propulsion / structures / avionics / systems engineering].</p><p>I\'ve spent my career working on [launch vehicles / satellites / defense systems]. Driven by building things that work at the edge of what\'s physically possible.</p><p>Outside engineering, I [hobby or interest].</p>' },
  { tag:'Flight Log',    name:'Experience', sub:'Missions and roles I have been part of.', angle:Math.PI*2/5,
    body:'<p><strong style="color:#fff">Senior Aerospace Engineer</strong> — Company Name (2021–Present)<br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Key responsibilities and impact. What systems did you own?</span></p><br/><p><strong style="color:#fff">Aerospace Engineer II</strong> — Previous Company (2018–2021)<br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">What you contributed — tests passed, launches supported.</span></p><br/><p><strong style="color:#fff">Engineering Intern</strong> — Earlier Company (2017)<br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Brief description of your internship.</span></p>' },
  { tag:'Payload Bay',   name:'Projects',   sub:'Technical work I am proud of.',           angle:Math.PI*4/5,
    body:'<p><strong style="color:#fff">Project One</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Goal, your role, outcome.</span></p><br/><p><strong style="color:#fff">Project Two</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Link to papers, GitHub repos, or writeups.</span></p><br/><p><strong style="color:#fff">Project Three</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Side projects, research, academic work.</span></p>' },
  { tag:'Systems Check', name:'Skills',     sub:'Tools, disciplines, and methods.',        angle:Math.PI*6/5,
    body:'<p><strong style="color:#fff">Disciplines</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">Structural analysis · Propulsion · GNC · Systems engineering · Thermal management</span></p><br/><p><strong style="color:#fff">Tools &amp; Software</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">MATLAB · Simulink · ANSYS · CATIA / SolidWorks · Python · STK</span></p><br/><p><strong style="color:#fff">Education</strong><br/><span style="color:rgba(255,255,255,.5);font-size:.85rem">B.S./M.S. Aerospace Engineering — University Name</span></p>' },
  { tag:'Ground Control', name:'Contact',   sub:'Let us connect and build something.',     angle:Math.PI*8/5,
    body:'<p>Open to new opportunities, collaborations, and interesting problems in aerospace.</p><br/><p>Email: <a href="mailto:your@email.com" style="color:#5de0f8">your@email.com</a></p><p>LinkedIn: <a href="https://linkedin.com/in/yourprofile" target="_blank" style="color:#5de0f8">linkedin.com/in/yourprofile</a></p><p>GitHub: <a href="https://github.com/yourusername" target="_blank" style="color:#5de0f8">github.com/yourusername</a></p>' }
];

// ── RENDERER ─────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x7ab8e0);
renderer.outputEncoding = THREE.sRGBEncoding; // correct color for GLB textures
renderer.physicallyCorrectLights = true;

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 2.5, 13);
camera.lookAt(0, 2.0, 0);

window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── LIGHTS — tuned for fully textured PBR GLB ────────────────────────────────
scene.add(new THREE.AmbientLight(0x667788, 0.9));  // softer ambient so textures aren't washed out
var sun = new THREE.DirectionalLight(0xfff8e8, 3.0);
sun.position.set(8, 12, 6);
scene.add(sun);
var fill = new THREE.DirectionalLight(0xaaddff, 0.6);
fill.position.set(-6, 2, -4);
scene.add(fill);
var back = new THREE.DirectionalLight(0x223344, 0.4);
back.position.set(0, -5, -8);
scene.add(back);

// ── ROCKET GROUP (stays at fixed Y always) ────────────────────────────────────
var rocket = new THREE.Group();
scene.add(rocket);
var rocketBaseY = 0.28;
rocket.position.y = rocketBaseY;

// ── LOAD GLB MODEL ────────────────────────────────────────────────────────────
var modelLoaded = false;
var loaderBar   = document.getElementById('loader-bar');
var loaderPct   = document.getElementById('loader-pct');
var loaderStatus= document.getElementById('loader-status');
var loaderEl    = document.getElementById('loader');
var debugEl     = document.getElementById('debug');

var loader = new THREE.GLTFLoader();
loader.load(
  'NewGlenn.glb',

  // ── ON LOAD ──
  function(gltf) {
    var model = gltf.scene;

    // Auto-fit: measure bounding box and scale/center model automatically
    var box = new THREE.Box3().setFromObject(model);
    var size = new THREE.Vector3();
    var center = new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    // Target height: 8 units (fills the view nicely)
    var targetH = 8.0;
    var scale = targetH / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale);

    // Re-measure after scale
    box.setFromObject(model);
    box.getCenter(center);
    box.getSize(size);

    // Center horizontally, sit base at y=0 within rocket group
    model.position.x = -center.x;
    model.position.z = -center.z;
    model.position.y = -box.min.y; // base sits at rocket group origin

    // Y-up confirmed — no rotation correction needed
    rocket.add(model);
    modelLoaded = true;

    // Show debug info briefly so you can tune if needed
    debugEl.innerHTML =
      'Model size: ' + size.x.toFixed(2) + ' x ' + size.y.toFixed(2) + ' x ' + size.z.toFixed(2) + '<br>' +
      'Applied scale: ' + scale.toFixed(4) + '<br>' +
      'Meshes: ' + (function(n,o){o.traverse(function(c){if(c.isMesh)n++;});return n;})(0,model);
    debugEl.classList.add('show');
    setTimeout(function(){ debugEl.classList.remove('show'); }, 5000);

    // Hide loader
    loaderStatus.textContent = 'Vehicle ready';
    loaderBar.style.width = '100%';
    loaderPct.textContent = '100%';
    setTimeout(function(){
      loaderEl.classList.add('hidden');
      setTimeout(function(){ loaderEl.style.display='none'; }, 900);
    }, 400);

    // Add flame and decals now that model is placed
    buildFlameAndDecals();
  },

  // ── ON PROGRESS ──
  function(xhr) {
    if(xhr.lengthComputable) {
      var pct = Math.round(xhr.loaded / xhr.total * 100);
      loaderBar.style.width = pct + '%';
      loaderPct.textContent = pct + '%';
      if(pct > 30)  loaderStatus.textContent = 'Parsing geometry...';
      if(pct > 70)  loaderStatus.textContent = 'Loading textures...';
      if(pct > 90)  loaderStatus.textContent = 'Finalizing...';
    }
  },

  // ── ON ERROR ──
  function(err) {
    console.error('GLB load error:', err);
    loaderStatus.textContent = 'Error loading model — check filename & repo';
    loaderPct.textContent = '!';
    loaderBar.style.background = '#c13a2a';
    // Still hide loader after delay and show fallback geometry
    setTimeout(function(){
      loaderEl.classList.add('hidden');
      setTimeout(function(){ loaderEl.style.display='none'; }, 900);
    }, 2000);
    buildFallbackRocket();
    buildFlameAndDecals();
    modelLoaded = true;
  }
);

// ── FALLBACK GEOMETRY (shown if GLB fails to load) ───────────────────────────
function buildFallbackRocket() {
  var mW = new THREE.MeshPhongMaterial({color:0xedf2f8,shininess:100});
  var mD = new THREE.MeshPhongMaterial({color:0x182030,shininess:60});
  var mM = new THREE.MeshPhongMaterial({color:0x7a8fa0,shininess:180});
  rocket.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.40,6.0,32),mW),{position:{x:0,y:3,z:0}}));
  rocket.add(Object.assign(new THREE.Mesh(new THREE.ConeGeometry(0.30,3.0,32),mW),{position:{x:0,y:8.5,z:0}}));
  rocket.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.36,0.8,24,1,true),mM),{position:{x:0,y:-0.4,z:0}}));
}

// ── FLAME + DECALS (built after model loads so position is known) ─────────────
var flameGroup, flameMeshes;
function buildFlameAndDecals() {

  // Flame — positioned at base of rocket group
  flameGroup = new THREE.Group();
  flameGroup.position.y = 0.0; // bottom of rocket group origin
  rocket.add(flameGroup);

  var flameDefs = [
    {r:0.13,h:0.9, col:0xffffff,op:0.95},
    {r:0.20,h:1.6, col:0xffee88,op:0.80},
    {r:0.27,h:2.4, col:0xff8800,op:0.55},
    {r:0.34,h:3.4, col:0xff3300,op:0.28},
    {r:0.40,h:4.2, col:0xcc1100,op:0.12}
  ];
  flameMeshes = [];
  for(var i=0;i<flameDefs.length;i++){
    var fd=flameDefs[i];
    var fm=new THREE.Mesh(
      new THREE.ConeGeometry(fd.r,fd.h,10),
      new THREE.MeshBasicMaterial({color:fd.col,transparent:true,opacity:fd.op})
    );
    fm.rotation.x=Math.PI;
    fm.position.y=-(i*0.22);
    flameGroup.add(fm);
    flameMeshes.push({mat:fm.material,base:fd.op});
  }
  flameGroup.visible=false;

  // Decals — vertical text on hull
  var bodyRadius = 0.44; // slightly proud of model surface
  var bodyMidY   = 3.0;  // vertical center of body section

  for(var si=0;si<SECTIONS.length;si++){
    (function(sec){
      var cw=1024, ch=72;
      var cvs=document.createElement('canvas');
      cvs.width=cw; cvs.height=ch;
      var ctx=cvs.getContext('2d');
      ctx.clearRect(0,0,cw,ch);
      ctx.font='900 52px "Arial Narrow",Arial';
      ctx.textAlign='left';
      ctx.textBaseline='middle';
      var txt=sec.name.toUpperCase();
      var tw=ctx.measureText(txt).width;
      var sx=(cw-tw)/2;
      ctx.shadowColor='rgba(0,0,0,0.4)';
      ctx.shadowBlur=4; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
      ctx.fillStyle='rgba(18,18,22,0.93)';
      ctx.fillText(txt,sx,ch/2);
      ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
      ctx.strokeStyle='rgba(93,224,248,0.7)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx-4,ch-7); ctx.lineTo(sx+tw+4,ch-7); ctx.stroke();

      var tex=new THREE.CanvasTexture(cvs);
      var plane=new THREE.Mesh(
        new THREE.PlaneGeometry(2.8,0.22),
        new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false,polygonOffset:true,polygonOffsetFactor:-1,polygonOffsetUnits:-1})
      );
      var a=sec.angle;
      plane.position.set(Math.sin(a)*bodyRadius, bodyMidY, Math.cos(a)*bodyRadius);
      plane.rotation.y=-a;
      plane.rotation.z=Math.PI/2;
      rocket.add(plane);
    })(SECTIONS[si]);
  }
}

// ── LAUNCHPAD WORLD (descends during launch) ──────────────────────────────────
var world = new THREE.Group();
scene.add(world);

var ground=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshPhongMaterial({color:0x1e2420}));
ground.rotation.x=-Math.PI/2; world.add(ground);

var apron=new THREE.Mesh(new THREE.CircleGeometry(12,32),new THREE.MeshPhongMaterial({color:0x2e2e2e}));
apron.rotation.x=-Math.PI/2; apron.position.y=0.01; world.add(apron);

var pad=new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.2,0.28,32),new THREE.MeshPhongMaterial({color:0x3a3a3a}));
pad.position.y=0.14; world.add(pad);

var exhaustGlowMat=new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0,side:THREE.DoubleSide});
var exhaustGlow=new THREE.Mesh(new THREE.PlaneGeometry(3,3),exhaustGlowMat);
exhaustGlow.rotation.x=-Math.PI/2; exhaustGlow.position.y=0.02; world.add(exhaustGlow);

var gantryMat=new THREE.MeshPhongMaterial({color:0x445566});
var gPos=[[2.4,0],[-2.4,0],[0,2.4],[0,-2.4]];
for(var gi=0;gi<gPos.length;gi++){
  var gt=new THREE.Mesh(new THREE.BoxGeometry(0.12,5.5,0.12),gantryMat);
  gt.position.set(gPos[gi][0],2.75,gPos[gi][1]); world.add(gt);
}

var cloudMat=new THREE.MeshPhongMaterial({color:0xffffff,transparent:true,opacity:0.65});
var cloudGroup=new THREE.Group(); world.add(cloudGroup);
for(var ci=0;ci<22;ci++){
  var cx=(Math.random()-.5)*90, cy=16+Math.random()*12, cz=(Math.random()-.5)*90-15;
  for(var cj=0;cj<5;cj++){
    var puff=new THREE.Mesh(new THREE.SphereGeometry(1.4+Math.random()*2.2,8,6),cloudMat.clone());
    puff.position.set(cx+(Math.random()-.5)*5,cy+(Math.random()-.5)*0.6,cz+(Math.random()-.5)*4);
    puff.scale.y=0.32; cloudGroup.add(puff);
  }
}

// ── STARS ────────────────────────────────────────────────────────────────────
var starGeo=new THREE.BufferGeometry();
var sPos=new Float32Array(5000*3);
for(var i=0;i<5000*3;i++) sPos[i]=(Math.random()-.5)*1800;
starGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
var starMat=new THREE.PointsMaterial({color:0xffffff,size:1.4,sizeAttenuation:true,transparent:true,opacity:0});
scene.add(new THREE.Points(starGeo,starMat));

// ── METEORS ──────────────────────────────────────────────────────────────────
var meteors=[];
function spawnMeteor(){
  var g=new THREE.Group();
  var len=2.0+Math.random()*3.5;
  var mm=new THREE.MeshBasicMaterial({color:0xffee99,transparent:true,opacity:0.9});
  var m=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.004,len,4),mm);
  m.rotation.z=Math.PI/2; g.add(m);
  var tm=new THREE.MeshBasicMaterial({color:0xff9944,transparent:true,opacity:0.35});
  var tail=new THREE.Mesh(new THREE.CylinderGeometry(0.038,0.0,len*2,4),tm);
  tail.rotation.z=Math.PI/2; tail.position.x=len*0.6; g.add(tail);
  g.position.set(28+Math.random()*18,10+Math.random()*22,-12-Math.random()*28);
  var spd=0.3+Math.random()*0.5;
  g.userData={vx:-spd,vy:-spd*0.38,mat:mm,tmat:tm,life:0,maxLife:130};
  scene.add(g); meteors.push(g);
}

// ── SKY ──────────────────────────────────────────────────────────────────────
var skyDay  =new THREE.Color(0x7ab8e0);
var skyDusk =new THREE.Color(0x0e1e42);
var skySpace=new THREE.Color(0x020810);

// ── STATE ────────────────────────────────────────────────────────────────────
var phase='prelaunch', launchT=0, worldDescendSpeed=0;
var currentSection=0, targetRotY=0, rotY=0;
var navBusy=false, meteorTimer=0, rotationEnabled=false;

// ── DOTS ─────────────────────────────────────────────────────────────────────
var dotsEl=document.getElementById('dots');
for(var di=0;di<SECTIONS.length;di++){
  var dot=document.createElement('div');
  dot.className='dot'+(di===0?' active':'');
  dotsEl.appendChild(dot);
}
function updateLabel(idx){
  var s=SECTIONS[idx];
  document.getElementById('label-tag').textContent=s.tag;
  document.getElementById('label-name').textContent=s.name;
  document.getElementById('label-sub').textContent=s.sub;
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('active',i===idx);});
}
updateLabel(0);

function showOrbitUI(){
  document.getElementById('name').style.opacity='1';
  document.getElementById('arr-left').classList.add('show');
  document.getElementById('arr-right').classList.add('show');
  document.getElementById('label-hud').classList.add('show');
  document.getElementById('dots').classList.add('show');
  document.getElementById('hint').classList.add('show');
  document.getElementById('rotate-hint').classList.remove('show');
  document.getElementById('c').classList.add('orbit');
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function rotate(dir){
  if(navBusy||!rotationEnabled) return;
  navBusy=true;
  var lh=document.getElementById('label-hud');
  if(lh.classList.contains('show')){ lh.style.opacity='0'; }
  currentSection=(currentSection+dir+SECTIONS.length)%SECTIONS.length;
  targetRotY=-SECTIONS[currentSection].angle;
  setTimeout(function(){
    updateLabel(currentSection);
    lh.style.transition='opacity .45s';
    lh.style.opacity='1';
    navBusy=false;
  },340);
}
document.getElementById('btn-l').addEventListener('click',function(){rotate(-1);});
document.getElementById('btn-r').addEventListener('click',function(){rotate(1);});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')  rotate(-1);
  if(e.key==='ArrowRight') rotate(1);
  if(e.key==='Escape')     closePage();
  if(e.key==='Enter'&&phase==='orbit') openPage();
});

// ── LAUNCH ───────────────────────────────────────────────────────────────────
document.getElementById('c').addEventListener('click',function(){
  if(phase==='prelaunch'&&modelLoaded){
    phase='launching';
    if(flameGroup) flameGroup.visible=true;
    rotationEnabled=true;
    document.getElementById('launch-hint').style.display='none';
    document.getElementById('rotate-hint').classList.add('show');
    document.getElementById('arr-left').classList.add('show');
    document.getElementById('arr-right').classList.add('show');
  }
});

// ── PAGE OVERLAY ─────────────────────────────────────────────────────────────
function openPage(){
  if(phase!=='orbit') return;
  var s=SECTIONS[currentSection];
  document.getElementById('pg-tag').textContent=s.tag;
  document.getElementById('pg-title').textContent=s.name;
  document.getElementById('pg-body').innerHTML=s.body;
  document.getElementById('overlay').classList.add('open');
}
function closePage(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click',function(e){ if(e.target===document.getElementById('overlay'))closePage(); });
document.getElementById('label-name').addEventListener('click',openPage);
document.getElementById('label-cta').addEventListener('click',openPage);
document.getElementById('close-btn').addEventListener('click',closePage);

// ── HELPERS ──────────────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function lerpAngle(a,b,t){var d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

// ── ANIMATE ──────────────────────────────────────────────────────────────────
var clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var dt=clock.getDelta();
  var t=clock.getElapsedTime();

  if(flameGroup&&flameGroup.visible){
    var fl=0.86+Math.sin(t*32)*0.14;
    flameGroup.scale.set(fl,0.82+Math.sin(t*26)*0.20,fl);
    if(flameMeshes){
      for(var fi=0;fi<flameMeshes.length;fi++){
        flameMeshes[fi].mat.opacity=flameMeshes[fi].base*(0.75+Math.random()*0.25);
      }
    }
  }

  if(rotationEnabled){
    rotY=lerpAngle(rotY,targetRotY,0.06);
    rocket.rotation.y=rotY;
  }

  if(phase==='prelaunch'){
    rocket.position.y=rocketBaseY+Math.sin(t*0.9)*0.025;
    camera.position.set(0,2.5,13);
    camera.lookAt(0,2.0,0);
  }

  if(phase==='launching'){
    launchT+=dt;
    var lt=launchT;
    rocket.position.y=rocketBaseY;
    worldDescendSpeed=lt*lt*0.60;
    world.position.y-=worldDescendSpeed*dt;
    exhaustGlowMat.opacity=clamp(1.0-lt*0.4,0,0.55);
    var skyT=clamp(lt/7.5,0,1);
    var skyCol=new THREE.Color();
    if(skyT<0.5){ skyCol.lerpColors(skyDay,skyDusk,skyT*2); }
    else         { skyCol.lerpColors(skyDusk,skySpace,(skyT-0.5)*2); }
    renderer.setClearColor(skyCol);
    starMat.opacity=clamp(skyT*1.4,0,1);
    camera.position.z=lerp(13,11.5,easeInOut(clamp(lt/6.0,0,1)));
    camera.lookAt(0,2.5,0);
    if(lt>9.0){
      phase='orbit';
      world.visible=false;
      if(flameGroup) flameGroup.visible=false;
      renderer.setClearColor(skySpace);
      starMat.opacity=1.0;
      exhaustGlowMat.opacity=0;
      showOrbitUI();
    }
  }

  if(phase==='orbit'){
    rocket.position.y=Math.sin(t*0.5)*0.13;
    camera.position.x=lerp(camera.position.x,Math.sin(t*0.11)*0.22,0.015);
    camera.position.y=lerp(camera.position.y,2.5,0.012);
    camera.position.z=lerp(camera.position.z,11.5,0.012);
    camera.lookAt(0,1.8,0);
    meteorTimer+=dt;
    if(meteorTimer>2.2+Math.random()*4.5){spawnMeteor();meteorTimer=0;}
    for(var mi=meteors.length-1;mi>=0;mi--){
      var met=meteors[mi];
      met.userData.life++;
      met.position.x+=met.userData.vx;
      met.position.y+=met.userData.vy;
      var lr=met.userData.life/met.userData.maxLife;
      met.userData.mat.opacity=0.9*(1-lr);
      met.userData.tmat.opacity=0.35*(1-lr);
      if(met.userData.life>=met.userData.maxLife){scene.remove(met);meteors.splice(mi,1);}
    }
  }

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
